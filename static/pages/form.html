<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预约登记</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    main {
      max-width: 560px;
      margin: 64px auto;
      padding: 32px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 12px 28px rgba(31, 41, 55, 0.08);
    }
    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 12px 16px;
      border: 0;
      border-radius: 6px;
      background: #0f766e;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    #result {
      min-height: 28px;
      margin-top: 20px;
      font-size: 18px;
      font-weight: 700;
      color: #047857;
    }
  </style>
</head>
<body>
  <main>
    <h1>预约登记</h1>
    <form onsubmit="submitForm(event)">
      <label for="name">姓名</label>
      <input aria-label="姓名" id="name" name="name" autocomplete="name" />

      <label for="phone">手机号</label>
      <input aria-label="手机号" id="phone" name="phone" autocomplete="tel" />

      <button type="submit">提交</button>
    </form>
    <div id="result" role="status"></div>
  </main>

  <script>
    function submitForm(event) {
      event.preventDefault();
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const result = document.getElementById("result");
      if (!name || !phone) {
        result.innerText = "请填写完整信息";
        return;
      }
      result.innerText = `提交成功：${name} ${phone}`;
    }
  </script>
</body>
</html>
